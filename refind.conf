# rEFInd Configuration — macOS-style boot picker
# Clean, minimal, dark theme

# Auto-boot after 3 seconds (press any key to interrupt)
timeout 3

# Default selection (first auto-detected entry)
default_selection 1

# Use highest available resolution
resolution max

# Hide unnecessary UI elements for clean look
hideui banner hints arrows badge label singleuser
# Show: icons only, macOS picker style

# Use graphical mode for text
use_graphics_for osx,linux,windows

# Scanning — only scan for actual bootloaders
scanfor manual,external,optical,biosexternal

# Selection highlight — macOS blue
selection_big   selection_big.png
selection_small selection_small.png

# Text colors — clean white/grey
textcolor 200 200 200
selected_color 255 255 255

# Don't store vars in NVRAM (save wear)
use_nvram false

# Direct boot (skip submenus for single-entry)
also_scan_dirs boot,EFI/BOOT,EFI/systemd

# ─── Arch Linux Entry ────────────────────────────────
menuentry "Arch Linux" {
    icon    /EFI/refind/icons/os_arch.png
    volume  "Arch Linux"
    loader  /boot/vmlinuz-linux
    initrd  /boot/initramfs-linux.img
    options "root=UUID=82aa39e5-0385-489a-a7ee-b0d6c7ca6b09 rw quiet splash loglevel=3"
    
    submenuentry "Boot using fallback initramfs" {
        initrd /boot/initramfs-linux-fallback.img
    }
    submenuentry "Boot to terminal (recovery)" {
        add_options "systemd.unit=multi-user.target"
    }
}

menuentry "Arch Linux (LTS)" {
    icon    /EFI/refind/icons/os_arch.png
    volume  "Arch Linux"
    loader  /boot/vmlinuz-linux-lts
    initrd  /boot/initramfs-linux-lts.img
    options "root=UUID=82aa39e5-0385-489a-a7ee-b0d6c7ca6b09 rw quiet splash loglevel=3"
    
    submenuentry "Boot using fallback initramfs" {
        initrd /boot/initramfs-linux-lts-fallback.img
    }
    submenuentry "Boot to terminal (recovery)" {
        add_options "systemd.unit=multi-user.target"
    }
}
