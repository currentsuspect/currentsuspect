<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Portal — NexaCore</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 48px; width: 360px; }
    h2 { margin-bottom: 8px; font-size: 22px; }
    p { color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    input { width: 100%; padding: 10px 14px; background: #1a1a2e; border: 1px solid #374151; border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; }
    button { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    /* default PIN is 1337 - TODO: force change on first login */
  </style>
</head>
<body>
  <div class="card">
    <h2>🔒 Staff Portal</h2>
    <p>NexaCore internal access only. Unauthorized access is prohibited.</p>
    <form>
      <input type="text" placeholder="Employee ID" />
      <input type="password" placeholder="PIN" />
      <button type="submit">Access Portal</button>
    </form>
  </div>
</body>
</html>
